<div class="max-w-5xl mx-auto px-6 py-8">
    <div
        class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-6 border border-slate-700 shadow-lg">
        <label
            class="block text-sm font-semibold text-slate-300 mb-4">Add
            PR to Track</label>
        <form hx-post="/api/prs"
            hx-target="#pr-list"
            hx-swap="beforeend"
            hx-on::after-request="this.reset();"
            class="flex gap-3">
            <input type="text" name="github_pr_url"
                placeholder="Paste GitHub PR URL or owner/repo#number"
                class="flex-1 px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition"
                @keydown.enter="this.closest('form').submit()" />
            <button type="submit"
                class="px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-semibold rounded-lg transition transform hover:scale-105 active:scale-95 flex items-center gap-2 hover:cursor-pointer">
                <svg class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M12 4v16m8-8H4"></path>
                </svg>
                Track PR
            </button>
        </form>
        <p
            class="text-xs text-slate-500 mt-3">Examples:
            https://github.com/owner/repo/pull/123
            or owner/repo#123</p>
    </div>
</div>
