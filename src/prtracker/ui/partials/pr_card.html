<div
    class="pr-card animate-fade-in bg-slate-800/50 border border-slate-700 rounded-lg p-4 hover:border-slate-600 transition group"
    id="pr-{{ pr.id }}">
    <div
        class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
            <!-- Header with status -->
            <div
                class="flex items-center gap-3 mb-2">
                <div
                    class="w-3 h-3 rounded-full flex-shrink-0
                    {% if pr.status == 'success' %} bg-emerald-500
                    {% elif pr.status == 'merged' %} bg-purple-500
                    {% elif pr.status == 'closed' %} bg-slate-500
                    {% elif pr.status == 'failure' %} bg-red-500
                    {% else %} bg-yellow-500
                    {% endif %}
                "></div>
                <span
                    class="text-xs font-semibold px-2 py-1 rounded-full
                    {% if pr.status == 'success' %} bg-emerald-500/20 text-emerald-300
                    {% elif pr.status == 'merged' %} bg-purple-500/20 text-purple-300
                    {% elif pr.status == 'closed' %} bg-slate-500/20 text-slate-300
                    {% elif pr.status == 'failure' %} bg-red-500/20 text-red-300
                    {% else %} bg-yellow-500/20 text-yellow-300
                    {% endif %}
                ">{{ pr.status|upper
                    }}</span>
            </div>

            <!-- Title -->
            <h3
                class="text-sm font-semibold text-slate-100 truncate mb-2"
                title="{{ pr.title }}">{{
                pr.title }}</h3>

            <!-- Meta info -->
            <div
                class="flex flex-wrap gap-3 text-xs text-slate-400">
                <span
                    class="flex items-center gap-1">
                    <svg class="w-3 h-3"
                        fill="currentColor"
                        viewBox="0 0 20 20"><path
                            fill-rule="evenodd"
                            d="M4.5 2a1.5 1.5 0 00-1.5 1.5v14a1.5 1.5 0 001.5 1.5h11a1.5 1.5 0 001.5-1.5V3.5a1.5 1.5 0 00-1.5-1.5h-11zm2 5a.5.5 0 01.5-.5h6a.5.5 0 010 1H7a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h6a.5.5 0 010 1H7a.5.5 0 01-.5-.5z"
                            clip-rule="evenodd"></path></svg>
                    {{ pr.repo }}
                </span>
                <span>#{{ pr.number }}</span>
                <span
                    class="flex items-center gap-1">
                    <svg class="w-3 h-3"
                        fill="currentColor"
                        viewBox="0 0 20 20"><path
                            fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 11-2 0 1 1 0 012 0zm0 3.5a1 1 0 11-2 0 1 1 0 012 0z"
                            clip-rule="evenodd"></path></svg>
                    {{ pr.updated_at }}
                </span>
            </div>
        </div>

        <!-- Remove button -->
        <button
            class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-700/50 hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition flex items-center justify-center opacity-0 group-hover:opacity-100"
            hx-delete="/api/prs/{{ pr.id }}"
            hx-target="#pr-{{ pr.id }}"
            hx-swap="outerHTML swap:1s"
            hx-confirm="Stop tracking this PR?"
            title="Stop tracking">
            <svg class="w-4 h-4" fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
